<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diário de Classe · 2026</title>
  <link rel="icon" href="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/assets/svg/1f4d3.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="calendario.css" />
</head>
<body>

  <header class="app-header">
    <!-- hambúrguer: só aparece no mobile -->
    <button class="btn-hamburger" id="btn-hamburger" onclick="toggleMobileNav()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="header-logo">Diário<span> de Classe</span></div>
    <span class="header-tagline">E.E. · 2026 · Geografia · Sociologia · Atualidades</span>
  </header>

  <!-- barra de navegação mobile (dropdown do topo) -->
  <nav class="mob-nav" id="mob-nav" aria-hidden="true">
    <button class="mob-nav-acao mob-nav-cal" onclick="abrirCalendario(); fecharMobileNav()" id="mob-btn-cal">
      📅 Calendário
    </button>
    <div id="mob-nav-turmas"></div>
    <button class="mob-nav-acao mob-nav-gestao" onclick="abrirPainelGestao(); fecharMobileNav()">
      ⚙ Gestão
    </button>
  </nav>
  <div class="mob-nav-overlay" id="mob-nav-overlay" onclick="fecharMobileNav()"></div>

  <div class="app-layout">

    <aside class="sidebar" id="sidebar">
      <!-- calendário no topo da sidebar -->
      <button class="btn-cal-sidebar" id="btn-calendario" onclick="abrirCalendario()">📅 Calendário</button>
      <div class="sidebar-titulo">Turmas</div>
      <div id="sidebar-turmas"></div>
      <button class="btn-gestao-sidebar" id="btn-gestao">⚙ Painel de Gestão</button>
    </aside>

    <main class="main-content">
      <div id="conteudo-principal"></div>
    </main>

  </div>

  <!-- Firebase SDK (compat — funciona sem bundler/npm) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey:            "AIzaSyAqdTVWYfROLnFfrBm4xLIVp5w1noUo2xk",
      authDomain:        "diariodeclassev1.firebaseapp.com",
      projectId:         "diariodeclassev1",
      storageBucket:     "diariodeclassev1.firebasestorage.app",
      messagingSenderId: "99507158812",
      appId:             "1:99507158812:web:204120b1000b4891c4c4d9"
    });
  </script>
  <style>
    @keyframes pin-shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-10px); }
      40%     { transform: translateX(10px); }
      60%     { transform: translateX(-8px); }
      80%     { transform: translateX(8px); }
    }
  </style>

  <script src="aulas.js"></script>
  <script src="app.js"></script>
  <script src="calendario.js"></script>

</body>
</html>
