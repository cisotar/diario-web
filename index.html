  <style>
    .app-header { display: flex; align-items: center; gap: 0; }
    .header-tagline {
      flex: 1;
      text-align: center;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #auth-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.25);
      color: #c0cad6;
      font-family: 'DM Sans', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .04em;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      position: relative;
      z-index: 9995;
    }
    #auth-btn:hover { background: rgba(255,255,255,.1); color: #fff; border-color: rgba(255,255,255,.4); }
    #auth-btn.logado { border-color: #0d9488; color: #5eead4; }
    #auth-btn.logado:hover { background: rgba(13,148,136,.15); }
  </style>
